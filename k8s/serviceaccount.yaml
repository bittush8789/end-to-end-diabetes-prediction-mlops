apiVersion: v1
kind: Namespace
metadata:
  name: diabetes-prediction
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-secret
  namespace: diabetes-prediction
annotations:
  serving.kserve.io/s3-endpoint: s3.amazonaws.com
  serving.kserve.io/s3-usehttps: "1"
  serving.kserve.io/s3-region: us-east-1
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-s3-access
  namespace: diabetes-prediction
secrets:
  - name: s3-secret
